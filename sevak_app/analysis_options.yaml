analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat these as errors, not warnings
    invalid_annotation_target: ignore   # For freezed compatibility
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # ── Style ────────────────────────────────────────────────────────────────
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_fields
    - prefer_final_locals
    - avoid_print                    # Use logger instead of print()
    - avoid_dynamic_calls

    # ── Performance ──────────────────────────────────────────────────────────
    - use_build_context_synchronously
    - cancel_subscriptions           # Prevent memory leaks

    # ── Architecture ─────────────────────────────────────────────────────────
    - always_declare_return_types
    - prefer_relative_imports
